<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وێب سایتێ دەرسان و چاتێ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <h2>سلاڤ! بێخە مێشکا خۆ، لێرە دشێی پرسیارێن خۆ بکەی</h2>
        
        <!-- جهێ نیشاندانا پەيامان -->
        <div id="chat-box" class="chat-box">
            <div class="message bot-message">سلاڤ! من چۆن دشێم هاریکاریا تە بکەم د دەرسان دا؟</div>
        </div>

        <!-- فۆرمێ نڤیسینا پەیامێ -->
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="لێرە پەیاما خۆ بنڤیسە..." />
            <button onclick="sendMessage()">هنارتن</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
