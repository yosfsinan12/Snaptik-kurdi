<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یوسف سۆچی - داگرکەرا ڤیدیۆیان</title>
    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
            text-align: center;
        }
        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }
        .social-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }
        .snapchat { background-color: #facc15; color: #000; }
        .tiktok { background-color: #000000; border: 1px solid #38bdf8; }
        .telegram { background-color: #0284c7; }
        
        .social-btn:hover {
            opacity: 0.85;
        }
        input[type="text"] {
            width: 90%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #fff;
            margin-bottom: 15px;
            font-size: 14px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #38bdf8;
        }
        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover {
            background: #0ea5e9;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>یوسف سۆچی</h1>
        <div class="subtitle">داگرکەرا ڤیدیۆیان بێ وەتەرمارک (120fps)</div>
        
        <div class="social-box">
            <a href="https://snapchat.com/add/K4BOOS_SURCHI" target="_blank" class="social-btn snapchat">
                سناپچات: K4BOOS_SURCHI
            </a>
            <a href="https://tiktok.com/@yuseef_surchi" target="_blank" class="social-btn tiktok">
                تیکتۆک: yuseef_surchi
            </a>
            <a href="https://t.me/YUSEEF_SURCHI" target="_blank" class="social-btn telegram">
                تێلگرام: YUSEEF_SURCHI
            </a>
        </div>

        <input type="text" id="urlInput" placeholder="لێنکا ڤیدیۆیێ ل ڤێرە دانە...">
        <button onclick="startDownload()">داگرتن</button>
        
        <div class="footer">خودانێ وێبسایتێ: یوسف سۆچی</div>
    </div>

    <script>
        function startDownload() {
            const url = document.getElementById('urlInput').value;
            if(!url) {
                alert("ژ بەر هەوە، لێنکا ڤیدیۆیێ دانە!");
                return;
            }
            // ڤەکرنا پەڕەیا داگرتنێ یا ڕاستەقینە ل سەر بنەمایێ لینکێ هاتیە دایین
            alert("لینک هاتە وەرگرتن! نوکە ڤیدیۆ ب 120fps دهێتە ئامادەکرن...");
            window.open('https://tikmate.app/en/?url=' + encodeURIComponent(url), '_blank');
        }
    </script>

</body>
</html>
